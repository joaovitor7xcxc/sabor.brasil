<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sabor do Brasil</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <style>
    :root {
      --laranja:#D97014;
      --laranja-escuro:#b85c0f;
      --branco:#fff;
      --erro:#FF0000;
      --fundo:#faf7f4;
      --texto-principal:#1a1008;
      --texto-secundario:#6b5a4e;
      --borda:#e8ddd6;
    }

    *{margin:0;padding:0;box-sizing:border-box;}

    body{
      font-family:'Inter',sans-serif;
      background:var(--fundo);
    }

    header{
      background:var(--laranja);
      padding:15px;
      display:flex;
      justify-content:space-between;
      color:white;
    }

    .btn{padding:8px 15px;border:none;border-radius:6px;cursor:pointer;}
    .btn-branco{background:white;color:var(--laranja);}
    .btn-laranja{background:var(--laranja);color:white;}

    main{padding:20px;}

    .card{background:white;padding:15px;margin-bottom:15px;border-radius:10px;}

    .grupo-campo input{
      width:100%;
      padding:10px;
      border:1px solid var(--borda);
      border-radius:8px;
    }

    /* ✅ ERRO IMPLEMENTADO */
    .grupo-campo input.campo-erro{
      border-color:#FF0000;
      background:#fff5f5;
    }

    .msg-erro{
      display:none;
      color:red;
      margin-top:5px;
    }
    .msg-erro.visivel{display:block;}

    .modal-overlay{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.5);
      display:none;
      align-items:center;
      justify-content:center;
    }

    .modal-overlay.visivel{display:flex;}

    .modal{
      background:white;
      padding:20px;
      border-radius:10px;
      width:300px;
    }
  </style>
</head>

<body>

<header>
  <h2>🍽️ Sabor do Brasil</h2>
  <div>
    <span id="info-usuario"></span>
    <button id="btn-abrir-modal" class="btn btn-branco" onclick="abrirModal()">Entrar</button>
    <button id="btn-logout" class="btn btn-branco" style="display:none" onclick="logout()">Sair</button>
  </div>
</header>

<main>
  {% for receita in receitas %}
  <div class="card">
    <h3>{{ receita.titulo }}</h3>
    <p>{{ receita.descricao }}</p>

    <button onclick="curtir({{ receita.id }}, this)">
      ❤️ <span>{{ receita.curtidas|length }}</span>
    </button>

    <button onclick="toggleComentarios({{ receita.id }})">
      💬
    </button>

    <div id="comentarios-{{ receita.id }}" style="display:none;">
      <input id="input-{{ receita.id }}" placeholder="comentário">
      <button onclick="comentar({{ receita.id }})">Enviar</button>
    </div>
  </div>
  {% endfor %}
</main>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3>Login</h3>

    <div class="grupo-campo">
      <input id="login-nickname" placeholder="nickname">
    </div>

    <div class="grupo-campo">
      <input id="login-senha" type="password" placeholder="senha">
    </div>

    <div id="erro-login" class="msg-erro"></div>

    <button class="btn btn-laranja" onclick="login()">Entrar</button>
  </div>
</div>

<script>
let usuarioAtual = {{ usuario | tojson }};

// HEADER
function atualizarHeader(){
  if(usuarioAtual){
    document.getElementById("btn-abrir-modal").style.display="none";
    document.getElementById("btn-logout").style.display="inline";
    document.getElementById("info-usuario").innerText="@"+usuarioAtual.nickname;
  }
}
atualizarHeader();

// MODAL
function abrirModal(){
  document.getElementById("modal").classList.add("visivel");
}

function fecharModal(){
  document.getElementById("modal").classList.remove("visivel");
}

// LOGIN
async function login(){
  limpar();

  let nick = document.getElementById("login-nickname");
  let senha = document.getElementById("login-senha");

  if(!nick.value || !senha.value){
    if(!nick.value) nick.classList.add("campo-erro");
    if(!senha.value) senha.classList.add("campo-erro");

    let erro = document.getElementById("erro-login");
    erro.innerText="Preencha tudo!";
    erro.classList.add("visivel");
    return;
  }

  let res = await fetch("/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({nickname:nick.value,senha:senha.value})
  });

  let dados = await res.json();

  if(!res.ok){
    let erro = document.getElementById("erro-login");
    erro.innerText=dados.erro;
    erro.classList.add("visivel");

    nick.classList.add("campo-erro");
    senha.classList.add("campo-erro");
    return;
  }

  location.reload();
}

// LIMPAR
function limpar(){
  document.querySelectorAll("input").forEach(i=>i.classList.remove("campo-erro"));
  document.getElementById("erro-login").classList.remove("visivel");
}

// CURTIR
async function curtir(id,btn){
  if(!usuarioAtual){
    abrirModal();
    return;
  }

  let res = await fetch("/curtir/"+id,{method:"POST"});
  let dados = await res.json();

  if(res.ok){
    btn.querySelector("span").innerText=dados.total_curtidas;
  }
}

// COMENTAR
function toggleComentarios(id){
  if(!usuarioAtual){
    abrirModal();
    return;
  }

  let div = document.getElementById("comentarios-"+id);
  div.style.display = div.style.display==="none" ? "block" : "none";
}

async function comentar(id){
  let input = document.getElementById("input-"+id);

  await fetch("/comentar/"+id,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({texto:input.value})
  });

  location.reload();
}

// LOGOUT
async function logout(){
  await fetch("/logout",{method:"POST"});
  location.reload();
}
</script>

</body>
</html>
